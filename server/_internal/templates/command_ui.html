<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Команды</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1f2937;
            --muted: #6b7280;
            --accent: #0f766e;
            --accent-strong: #0b4f4a;
            --surface: #ffffff;
            --panel: #f7f4ef;
        }
        body {
            padding: 24px;
            background: radial-gradient(circle at 15% 10%, #fdf7ef 0%, #eef4f2 60%, #eaf0f5 100%);
            color: var(--ink);
            font-family: "Manrope", "Segoe UI", sans-serif;
        }
        .page-header {
            background: var(--surface);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }
        .surface-card {
            background: var(--surface);
            border-radius: 18px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }
        .surface-card .card-header {
            background: var(--panel);
            border-bottom: 0;
            border-radius: 18px 18px 0 0;
        }
        .terminal {
            background: #111827;
            color: #f0f0f0;
            padding: 15px;
            border-radius: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            min-height: 200px;
            white-space: pre-wrap;
        }
        .stdout { color: #34d399; }
        .stderr { color: #f87171; }
    </style>
</head>
<body>
    <div class="container">
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">Home</a></li>
                <li class="breadcrumb-item active">Commands</li>
            </ol>
        </nav>
        
        <div class="page-header mb-4">
            <div class="d-flex flex-wrap justify-content-between align-items-start gap-3">
                <div>
                    <h1 class="mb-2">Отправить команду</h1>
                    <p class="text-muted mb-0">Отправьте команду клиенту и получите результат выполнения.</p>
                </div>
                <div class="d-flex gap-2">
                    <a class="btn btn-outline-secondary" href="/processes">Процессы</a>
                    <a class="btn btn-outline-secondary" href="/clients-ui">Клиенты</a>
                    <button class="btn btn-outline-secondary" onclick="location.reload()">Перезагрузка</button>
                </div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card surface-card">
                    <div class="card-header">
                        <h5>Шаблон команды</h5>
                    </div>
                    <div class="card-body">
                        <form id="commandForm">
                            <div class="mb-3">
                                <label for="clientId" class="form-label">Клиент</label>
                                <select class="form-select" id="clientId" required>
                                    <option value="">Выберите клиента...</option>
                                    {% for client in clients %}
                                    <option value="{{ client.client_id }}">{{ client.client_id }} ({{ client.address }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label for="command" class="form-label">Команда</label>
                                <input type="text" class="form-control" id="command" placeholder="Get-Process" required list="commandList">
                                <datalist id="commandList">
                                    {% for cmd in allowed_commands %}
                                    <option value="{{ cmd }}">
                                    {% endfor %}
                                </datalist>
                                <div class="form-text">Выберете из предложенных или введите свою</div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="timeout" class="form-label">Ожидание (секунд)</label>
                                <input type="number" class="form-control" id="timeout" value="60" min="1" max="300">
                            </div>
                            
                            <div class="mb-3">
                                <label for="correlationId" class="form-label">Идентификатор корреляции (необязательно)</label>
                                <input type="text" class="form-control" id="correlationId" placeholder="Для отслеживания">
                            </div>
                            
                            <button type="submit" class="btn btn-primary" id="submitBtn">Выполнить команду</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card surface-card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Результат</h5>
                        <span id="statusBadge" class="badge bg-secondary">Ожидание</span>
                    </div>
                    <div class="card-body">
                        <div id="resultArea">
                            <p class="text-muted">Отправьте команду, чтобы увидеть результаты здесь</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('commandForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const clientId = document.getElementById('clientId').value;
            const command = document.getElementById('command').value;
            const timeout = parseInt(document.getElementById('timeout').value);
            const correlationId = document.getElementById('correlationId').value;
            
            const submitBtn = document.getElementById('submitBtn');
            const statusBadge = document.getElementById('statusBadge');
            const resultArea = document.getElementById('resultArea');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            statusBadge.className = 'badge bg-info';
            statusBadge.textContent = 'Sending';
            
            try {
                const body = { command, timeout };
                if (correlationId) body.correlation_id = correlationId;
                
                const response = await fetch(`/api/clients/${clientId}/command`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                
                if (data.status === 'queued') {
                    statusBadge.className = 'badge bg-warning';
                    statusBadge.textContent = 'Queued';
                    resultArea.innerHTML = `<p>Job ID: <code>${data.job_id}</code></p><p>Ожидание исполнения...</p>`;
                    pollJobStatus(data.job_id);
                } else if (data.status === 'not_connected') {
                    statusBadge.className = 'badge bg-danger';
                    statusBadge.textContent = 'Error';
                    resultArea.innerHTML = '<p class="text-danger">Клиент не подключен</p>';
                } else {
                    statusBadge.className = 'badge bg-danger';
                    statusBadge.textContent = 'Rejected';
                    const details = data.rejection ? `
                        <details class="mt-2">
                            <summary>Details</summary>
                            <div><strong>Reason:</strong> ${data.rejection.reason}</div>
                            <div><strong>Policy:</strong> ${data.rejection.policy}</div>
                            <div><strong>Command:</strong> <code>${escapeHtml(data.rejection.command)}</code></div>
                        </details>
                    ` : '';
                    resultArea.innerHTML = `<p class="text-danger">Command blocked by server allowlist</p>${details}`;
                }
            } catch (error) {
                statusBadge.className = 'badge bg-danger';
                statusBadge.textContent = 'Error';
                resultArea.innerHTML = `<p class="text-danger">Error: ${error.message}</p>`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Execute Command';
            }
        });
        
        async function pollJobStatus(jobId) {
            const maxAttempts = 120;
            let attempts = 0;
            
            const poll = async () => {
                attempts++;
                try {
                    const response = await fetch(`/api/commands/${jobId}`);
                    const job = await response.json();
                    
                    const statusBadge = document.getElementById('statusBadge');
                    statusBadge.textContent = job.status.charAt(0).toUpperCase() + job.status.slice(1);
                    
                    if (job.status === 'executing') {
                        statusBadge.className = 'badge bg-primary';
                    }
                    
                    if (['finished', 'error', 'timeout'].includes(job.status)) {
                        displayJobResult(job);
                    } else if (attempts < maxAttempts) {
                        setTimeout(poll, 1000);
                    } else {
                        statusBadge.className = 'badge bg-danger';
                        statusBadge.textContent = 'Timeout';
                        document.getElementById('resultArea').innerHTML = '<p class="text-danger">Timeout waiting for result</p>';
                    }
                } catch (error) {
                    if (attempts < maxAttempts) {
                        setTimeout(poll, 1000);
                    }
                }
            };
            
            poll();
        }
        
        function displayJobResult(job) {
            const statusBadge = document.getElementById('statusBadge');
            const resultArea = document.getElementById('resultArea');
            
            if (job.status === 'finished') {
                statusBadge.className = 'badge bg-success';
            } else {
                statusBadge.className = 'badge bg-danger';
            }
            
            let html = `
                <p><strong>Job ID:</strong> <code>${job.id}</code></p>
                <p><strong>Command:</strong> <code>${escapeHtml(job.command)}</code></p>
                <p><strong>Status:</strong> ${job.status}</p>
                <p><strong>Exit Code:</strong> ${job.exit_code !== null ? job.exit_code : 'N/A'}</p>
                <p><strong>Started:</strong> ${job.started_at || 'N/A'}</p>
                <p><strong>Finished:</strong> ${job.finished_at || 'N/A'}</p>
            `;
            
            if (job.stdout) {
                html += `<hr><h6>STDOUT</h6><div class="terminal stdout">${escapeHtml(job.stdout)}</div>`;
            }
            
            if (job.stderr) {
                html += `<hr><h6>STDERR</h6><div class="terminal stderr">${escapeHtml(job.stderr)}</div>`;
            }
            
            resultArea.innerHTML = html;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
